# ~/.config/hypr/hyprlock.conf

background {
    monitor =
    path = /home/anywhay/Pictures/gowall/wallpaper11.jpg 
    blur_passes = 2
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +'%H:%M')"
    font_size = 64
    position = 0, 100
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:60000] echo "$(date +'%d %B %Y')"
    font_size = 24
    position = 0, 40
    halign = center
    valign = center
}

label {
    monitor =
    text = Welcome
    font_size = 20
    position = 0, -40
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 300, 50
    position = 0, -100
    halign = center
    valign = center
}
